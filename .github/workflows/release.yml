name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev ocl-icd-opencl-dev opencl-headers
      - name: Build
        run: gcc -O2 -o gpu_snake gpu_snake.c -lOpenCL -lncursesw -lm
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu_snake-linux-x86_64
          path: gpu_snake

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: gcc -O2 -o gpu_snake gpu_snake.c -framework OpenCL -lncurses
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu_snake-macos-x86_64
          path: gpu_snake

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GPU Snake ${{ github.ref_name }}
          body: |
            GPU Snake - Snake game with OpenCL GPU acceleration

            ### Downloads
            - `gpu_snake-linux-x86_64` - Linux x86_64
            - `gpu_snake-macos-x86_64` - macOS x86_64
            - Windows: build from source with MSYS2/MinGW (see README)

            ### Requirements
            - OpenCL runtime (install your GPU driver)
            - Terminal with UTF-8 support
          files: |
            artifacts/gpu_snake-linux-x86_64/gpu_snake
            artifacts/gpu_snake-macos-x86_64/gpu_snake
          draft: false
          prerelease: false
