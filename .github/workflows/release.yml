name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev ocl-icd-opencl-dev opencl-headers
      - name: Build
        run: gcc -O2 -o gpu_snake-linux-x86_64 gpu_snake.c -lOpenCL -lncursesw -lm
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu_snake-linux-x86_64
          path: gpu_snake-linux-x86_64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: gcc -O2 -o gpu_snake-macos-x86_64 gpu_snake.c -framework OpenCL -lncurses
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu_snake-macos-x86_64
          path: gpu_snake-macos-x86_64

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          release: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-opencl-icd mingw-w64-x86_64-opencl-headers mingw-w64-x86_64-ncurses mingw-w64-x86_64-pkgconf
      - name: Build
        run: |
          cp /mingw64/lib/libncursesw.a ./libncursesw_static.a
          gcc -O2 -o gpu_snake-windows-x86_64.exe gpu_snake.c \
            $(pkg-config --cflags ncursesw) \
            -Wl,-Bstatic ./libncursesw_static.a -Wl,-Bdynamic \
            -lOpenCL
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu_snake-windows-x86_64
          path: gpu_snake-windows-x86_64.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GPU Snake ${{ github.ref_name }}
          body: |
            GPU Snake - Snake game with OpenCL GPU acceleration

            ### Downloads
            - `gpu_snake-linux-x86_64` - Linux x86_64
            - `gpu_snake-macos-x86_64` - macOS x86_64
            - `gpu_snake-windows-x86_64.zip` - Windows x86_64 (extract and run)

            ### Requirements
            - OpenCL runtime (install your GPU driver)
            - Terminal with UTF-8 support
          files: |
            artifacts/gpu_snake-linux-x86_64/gpu_snake-linux-x86_64
            artifacts/gpu_snake-macos-x86_64/gpu_snake-macos-x86_64
            artifacts/gpu_snake-windows-x86_64/gpu_snake-windows-x86_64.exe
          draft: false
          prerelease: false
